# Training and model hyperparameters
# MAHE-Harman Track 2: Drivable Space Segmentation | Team VisionEdge

data:
  nuscenes_root: /path/to/nuscenes   # Update this path
  processed_dir: ./data/processed
  synthetic_dir: ./data/synthetic
  img_height: 256
  img_width:  512

model:
  num_classes: 2
  backbone: mobilenetv2
  decoder:  unet

training:
  epochs:      50
  batch_size:  16
  lr:          0.001
  weight_decay: 0.0001
  focal_weight: 0.5
  dice_weight:  0.5
  scheduler:   cosine

inference:
  target_fps:   30
  input_height: 256
  input_width:  512
  export_onnx:  true

output:
  checkpoint_dir: ./checkpoints
  sample_mask_dir: ./outputs/sample_masks
  onnx_path: ./model.onnx
